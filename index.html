<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAS Gestão</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>FAS Gestão</h2>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <button onclick="testarConexao()">Testar Conexão</button>

    <div class="status" id="status"></div>
</div>

<script>

// =============================
// 🔥 CONFIG
// =============================
const API_URL = "https://fas-proxy.felipeaugusto3489.workers.dev/";


// =============================
// 🚀 REQUEST BASE (CORRIGIDO)
// =============================
async function apiRequest(method, body = null) {

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);

    try {
        const res = await fetch(API_URL + "?t=" + Date.now(), {
            method: method,
            headers: {
                "Content-Type": "application/json"
            },
            body: body ? JSON.stringify(body) : null,
            cache: "no-store",
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (!res.ok) throw new Error("Erro HTTP");

        return await res.json();

    } catch (err) {
        throw err;
    }
}


// =============================
// 🔐 LOGIN (CORRIGIDO)
// =============================
async function login() {

    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    try {

        const data = await apiRequest("POST", {
            action: "login",
            usuario,
            senha
        });

        if (data.status === "ok") {

            // login persistente
            localStorage.setItem("auth", "true");

            alert("Login realizado com sucesso!");

        } else {
            alert("Usuário ou senha inválidos");
        }

    } catch (err) {
        alert("Erro de conexão com o servidor");
        console.error(err);
    }
}


// =============================
// 🔄 TESTAR CONEXÃO (MOBILE FIX)
// =============================
async function testarConexao() {

    const status = document.getElementById("status");

    status.innerHTML = "🔄 Testando conexão...";
    status.style.color = "white";

    try {

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const res = await fetch(API_URL + "?ping=" + Date.now(), {
            method: "GET",
            cache: "no-store",
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (!res.ok) throw new Error();

        status.innerHTML = "✅ Conectado com sucesso!";
        status.style.color = "#22c55e";

    } catch (err) {

        status.innerHTML = "❌ Erro de conexão";
        status.style.color = "#ef4444";

        console.error(err);
    }
}


// =============================
// 🔁 AUTO LOGIN (SEM MEXER UI)
// =============================
window.onload = () => {

    if (localStorage.getItem("auth") === "true") {
        console.log("Usuário já logado");
    }

};

</script>

</body>
</html>
