<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAS Gestão</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>FAS Gestão</h2>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <button onclick="testarConexao()">Testar Conexão</button>

    <div class="status" id="status"></div>
</div>

<script>

// 🔥 URL FIXA DO WORKER
const API_URL = "https://fas-proxy.felipeaugusto3489.workers.dev/";

// 🔐 LOGIN
async function login() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: "login",
                usuario,
                senha
            }),
            cache: "no-store"
        });

        const data = await res.json();

        if (data.status === "ok") {
            alert("Login realizado com sucesso!");
        } else {
            alert("Usuário ou senha inválidos");
        }

    } catch (err) {
        alert("Erro de conexão");
        console.error(err);
    }
}


// 🚀 BOTÃO TESTAR CONEXÃO (VERSÃO BLINDADA MOBILE)
async function testarConexao() {
    const status = document.getElementById("status");

    status.innerHTML = "🔄 Testando conexão...";
    status.style.color = "white";

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const res = await fetch(API_URL + "?ping=" + Date.now(), {
            method: "GET",
            cache: "no-store",
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (!res.ok) {
            throw new Error("Resposta inválida");
        }

        const text = await res.text();

        status.innerHTML = "✅ Conectado com sucesso!";
        status.style.color = "#22c55e";

    } catch (err) {
        status.innerHTML = "❌ Erro de conexão";
        status.style.color = "#ef4444";

        console.error("Erro:", err);
    }
}

</script>

</body>
</html>
